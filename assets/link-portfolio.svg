<svg xmlns="http://www.w3.org/2000/svg" width="242" height="52" viewBox="0 0 242 52" role="img" aria-labelledby="title desc" font-family="Segoe UI, Arial, sans-serif">
  <title id="title">Portfolio link button</title>
  <desc id="desc">Animated button linking to Rahul Mitra's portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="240" height="50" rx="15" fill="url(#bg)" stroke="url(#neon)" stroke-width="2" stroke-opacity="0.76">
    <animate attributeName="stroke-opacity" values="0.48;0.95;0.48" dur="5.2s" repeatCount="indefinite"/>
  </rect>
  <g stroke="#1e293b" stroke-width="1" opacity="0.62">
    <path d="M18 14H224M18 38H224M58 8V44M124 8V44M196 8V44"/>
  </g>
  <g transform="translate(26 15)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="2" width="24" height="18" rx="4" stroke="#5eead4" stroke-width="2.2"/>
    <path d="M5 8h14M5 13h8" stroke="#93c5fd" stroke-width="2"/>
    <circle cx="20" cy="5" r="2" fill="#a78bfa"/>
  </g>
  <text x="72" y="31" fill="#e2e8f0" font-size="17" font-weight="800">Portfolio</text>
  <text x="164" y="31" fill="#93c5fd" font-size="14" font-weight="700">Site</text>
</svg>
