<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320" role="img" aria-labelledby="title desc" font-family="Segoe UI, Arial, sans-serif">
  <title id="title">Rahul Mitra geometric algebra banner</title>
  <desc id="desc">Animated vectors, grid lines, a rotor ring, and curiosity quote for Rahul Mitra's GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1100" height="320" rx="28" fill="url(#bg)"/>

  <g stroke="#1e293b" stroke-width="1" opacity="0.82">
    <path d="M70 52H1030M70 110H1030M70 168H1030M70 226H1030M70 284H1030"/>
    <path d="M110 34V292M230 34V292M350 34V292M470 34V292M590 34V292M710 34V292M830 34V292M950 34V292"/>
    <path d="M70 284 350 52M190 292 470 52M310 292 590 52M430 292 710 52M550 292 830 52M670 292 950 52"/>
  </g>

  <g transform="translate(78 262)">
    <polygon points="0,0 150,-44 238,-112" fill="#0ea5e933" stroke="#38bdf8" stroke-width="2">
      <animate attributeName="points" dur="6s" repeatCount="indefinite"
        values="0,0 126,-36 212,-96;0,0 150,-44 238,-112;0,0 126,-36 212,-96"/>
    </polygon>
    <line x1="0" y1="0" x2="150" y2="-44" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)">
      <animate attributeName="x2" values="126;150;126" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-36;-44;-36" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="238" y2="-112" stroke="#a78bfa" stroke-width="4" marker-end="url(#arrow)">
      <animate attributeName="x2" values="212;238;212" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-96;-112;-96" dur="6s" repeatCount="indefinite"/>
    </line>
    <text x="162" y="-56" fill="#7dd3fc" font-size="18" font-family="Segoe UI, Arial">a</text>
    <text x="250" y="-120" fill="#c4b5fd" font-size="18" font-family="Segoe UI, Arial">b</text>
  </g>

  <g transform="translate(962 160)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#334155" stroke-width="13"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#neon)" stroke-width="9" stroke-dasharray="98 342" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="0" x2="62" y2="0" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="565" y="118" text-anchor="middle" fill="#f8fafc" font-size="56" font-weight="800">Rahul Mitra</text>
  <text x="565" y="154" text-anchor="middle" fill="#93c5fd" font-size="18">Cybersecurity - Software Engineering - Data Science</text>
  <text x="565" y="188" text-anchor="middle" fill="#5eead4" font-size="18" font-style="italic" font-weight="700">&quot;Learning Only Stops when You Give Up Curiosity&quot;</text>
</svg>
