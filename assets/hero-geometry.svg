<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320" role="img" aria-labelledby="title desc">
  <title id="title">Rahul Mitra geometric algebra banner</title>
  <desc id="desc">Animated vectors, grid lines, and a rotor ring for Rahul Mitra's GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1100" height="320" rx="28" fill="url(#bg)"/>

  <g stroke="#1e293b" stroke-width="1" opacity="0.82">
    <path d="M70 52H1030M70 110H1030M70 168H1030M70 226H1030M70 284H1030"/>
    <path d="M110 34V292M230 34V292M350 34V292M470 34V292M590 34V292M710 34V292M830 34V292M950 34V292"/>
    <path d="M70 284 350 52M190 292 470 52M310 292 590 52M430 292 710 52M550 292 830 52M670 292 950 52"/>
  </g>

  <g transform="translate(105 252)">
    <polygon points="0,0 250,-86 370,-182" fill="#0ea5e933" stroke="#38bdf8" stroke-width="2">
      <animate attributeName="points" dur="6s" repeatCount="indefinite"
        values="0,0 220,-70 330,-158;0,0 250,-86 370,-182;0,0 220,-70 330,-158"/>
    </polygon>
    <line x1="0" y1="0" x2="250" y2="-86" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)">
      <animate attributeName="x2" values="220;250;220" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-70;-86;-70" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="370" y2="-182" stroke="#a78bfa" stroke-width="4" marker-end="url(#arrow)">
      <animate attributeName="x2" values="330;370;330" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-158;-182;-158" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="-86" x2="540" y2="-122" stroke="#22d3ee" stroke-width="3" opacity="0.82" marker-end="url(#arrow)">
      <animate attributeName="x2" values="500;540;500" dur="7s" repeatCount="indefinite"/>
    </line>
    <text x="266" y="-96" fill="#7dd3fc" font-size="18" font-family="Segoe UI, Arial">a</text>
    <text x="386" y="-190" fill="#c4b5fd" font-size="18" font-family="Segoe UI, Arial">b</text>
  </g>

  <g transform="translate(962 160)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#334155" stroke-width="13"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#neon)" stroke-width="9" stroke-dasharray="98 342" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="0" x2="62" y2="0" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="565" y="132" text-anchor="middle" fill="#f8fafc" font-size="56" font-family="Segoe UI, Arial" font-weight="800">Rahul Mitra</text>
  <text x="565" y="168" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="Segoe UI, Arial">Cybersecurity - Software Engineering - Data Science</text>
</svg>
