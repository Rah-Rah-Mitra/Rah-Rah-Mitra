<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">Rah-Rah-Mitra's Custom GitHub Stats</title>
  <desc id="desc">Animated geometric GitHub summary card generated from GitHub API data.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="800" height="430" rx="22" fill="url(#bg)"/>

  <g opacity="0.4">
    <polygon points="0,70 110,0 250,0 100,95" fill="#0b1222">
      <animate attributeName="points" dur="8s" repeatCount="indefinite"
        values="0,70 110,0 250,0 100,95;0,50 125,0 250,0 120,105;0,70 110,0 250,0 100,95"/>
    </polygon>
    <polygon points="800,360 675,430 560,430 700,335" fill="#101a33">
      <animate attributeName="points" dur="10s" repeatCount="indefinite"
        values="800,360 675,430 560,430 700,335;800,340 660,430 540,430 685,320;800,360 675,430 560,430 700,335"/>
    </polygon>
  </g>

  <polyline points="40,120 760,120" stroke="url(#line)" stroke-width="2" stroke-dasharray="6 6" fill="none">
    <animate attributeName="stroke-dashoffset" from="0" to="-24" dur="2s" repeatCount="indefinite"/>
  </polyline>

  <text x="40" y="62" fill="#38bdf8" font-size="16" letter-spacing="1.5">RAH-RAH-MITRA • LIVE PROFILE SNAPSHOT</text>
  <text x="40" y="98" fill="#f8fafc" font-size="34" font-weight="700">Rah-Rah-Mitra</text>
  <text x="40" y="145" fill="#cbd5e1" font-size="16">Top languages: N/A</text>
  <text x="40" y="170" fill="#cbd5e1" font-size="16">Top starred repo: N/A</text>
  <text x="560" y="400" fill="#64748b" font-size="12">Offline preview values</text>

  <g transform="translate(80,190)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.0s" dur="0.6s" fill="freeze"/><rect width="190" height="90" rx="14" fill="#111827" stroke="#334155"/><text x="18" y="32" fill="#93c5fd" font-size="14">Followers</text><text x="18" y="66" fill="#e2e8f0" font-size="30" font-weight="700">0</text></g><g transform="translate(300,190)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.6s" fill="freeze"/><rect width="190" height="90" rx="14" fill="#111827" stroke="#334155"/><text x="18" y="32" fill="#93c5fd" font-size="14">Following</text><text x="18" y="66" fill="#e2e8f0" font-size="30" font-weight="700">0</text></g><g transform="translate(520,190)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.6s" fill="freeze"/><rect width="190" height="90" rx="14" fill="#111827" stroke="#334155"/><text x="18" y="32" fill="#93c5fd" font-size="14">Public Repos</text><text x="18" y="66" fill="#e2e8f0" font-size="30" font-weight="700">0</text></g><g transform="translate(80,300)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.44999999999999996s" dur="0.6s" fill="freeze"/><rect width="190" height="90" rx="14" fill="#111827" stroke="#334155"/><text x="18" y="32" fill="#93c5fd" font-size="14">Total Stars</text><text x="18" y="66" fill="#e2e8f0" font-size="30" font-weight="700">0</text></g><g transform="translate(300,300)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.6s" fill="freeze"/><rect width="190" height="90" rx="14" fill="#111827" stroke="#334155"/><text x="18" y="32" fill="#93c5fd" font-size="14">Total Forks</text><text x="18" y="66" fill="#e2e8f0" font-size="30" font-weight="700">0</text></g>
</svg>
