<svg xmlns="http://www.w3.org/2000/svg" width="980" height="450" viewBox="0 0 980 450" role="img" aria-labelledby="title desc">
  <title id="title">Rah-Rah-Mitra GitHub stats</title>
  <desc id="desc">Custom GitHub statistics card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="980" height="450" rx="20" fill="url(#bg)"/>
  <rect x="40" y="40" width="560" height="330" rx="12" fill="#181c31" stroke="#e5e7eb"/>
  <rect x="615" y="72" width="325" height="196" rx="12" fill="#181c31" stroke="#e5e7eb"/>
  <rect x="186" y="286" width="620" height="130" rx="10" fill="#181c31" stroke="#e5e7eb"/>

  <text x="66" y="88" fill="#7fb0ff" font-size="40" font-weight="700">Rah-Rah-Mitra's GitHub Stats</text>
  <text x="64" y="146" fill="#5eead4" font-size="20" font-weight="600">Followers:</text><text x="350" y="146" fill="#e2e8f0" font-size="20" font-weight="700">0</text><text x="64" y="180" fill="#5eead4" font-size="20" font-weight="600">Public Repos:</text><text x="350" y="180" fill="#e2e8f0" font-size="20" font-weight="700">0</text><text x="64" y="214" fill="#5eead4" font-size="20" font-weight="600">Total Stars:</text><text x="350" y="214" fill="#e2e8f0" font-size="20" font-weight="700">0</text><text x="64" y="248" fill="#5eead4" font-size="20" font-weight="600">Contributions (year):</text><text x="350" y="248" fill="#e2e8f0" font-size="20" font-weight="700">0</text><text x="64" y="282" fill="#5eead4" font-size="20" font-weight="600">Recent Commits:</text><text x="350" y="282" fill="#e2e8f0" font-size="20" font-weight="700">0</text><text x="64" y="316" fill="#5eead4" font-size="20" font-weight="600">Open Issues:</text><text x="350" y="316" fill="#e2e8f0" font-size="20" font-weight="700">0</text>
  <text x="64" y="360" fill="#67e8f9" font-size="17">Top languages: N/A</text>

  <text x="640" y="120" fill="#7fb0ff" font-size="40" font-weight="700">Signal</text>
  <circle cx="780" cy="182" r="63" fill="none" stroke="#2b3f75" stroke-width="10"/>
  <circle cx="780" cy="182" r="63" fill="none" stroke="#7fb0ff" stroke-width="10" stroke-linecap="round" stroke-dasharray="280 120">
    <animateTransform attributeName="transform" type="rotate" from="0 780 182" to="360 780 182" dur="7s" repeatCount="indefinite"/>
  </circle>

  <text x="214" y="340" fill="#7fb0ff" font-size="54" font-weight="700">0</text>
  <text x="214" y="384" fill="#93c5fd" font-size="30">Total Contributions</text>
  <text x="560" y="340" fill="#7fb0ff" font-size="54" font-weight="700">0</text>
  <text x="560" y="384" fill="#93c5fd" font-size="30">Total Stars</text>

  <text x="40" y="432" fill="#64748b" font-size="14">Offline preview</text>
</svg>
